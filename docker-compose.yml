version: '3.8'
services:
  signaling:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: vchat_signaling
    ports:
      - "4000:4000"
    environment:
      - SIGNALING_PORT=4000
    restart: unless-stopped

  coturn:
    image: instrumentisto/coturn:5.6.7
    container_name: vchat_coturn
    volumes:
      - ./deploy/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "5349:5349/tcp"
    restart: unless-stopped
